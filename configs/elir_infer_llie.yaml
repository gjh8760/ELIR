# ###########################################
# Setup Configuration
# ###########################################
env_cfg:
  run_name: elir_llie_lolv1
  project_name: fmir
  task: llie
  seed: 2025


# -------------------------------------------------
# Dataset
# -------------------------------------------------
dataset_cfg:
  val_dataset: {name: LOLv1, path: /data/gjh8760/datasets/LOL-v1, split: eval15, is_train: False, batch_size: 1, num_workers: 2}


# -------------------------------------------------
# Model
# -------------------------------------------------
model_cfg:
  arch_cfg: {name: elir,
             path: ./runs/elir_llie_lolv1/elir.pth,
             params: { fm_cfg: {k_steps: 5, sigma_s: 0.025, latent_shape: [16,32,32], seed: 2025},
                      fmir_cfg: {name: lunet,
                                params: {ch_mult: [1,2,1,2], n_mid_blocks: 3, in_channels: 16, hid_channels: 128, out_channels: 16,
                                         t_emb_dim: 160, overparametrization: False},
                                trainable: False},
                      mmse_cfg: {name: rrdbnet,
                                params: {c_inout: 16, c_hid: 96, n_rrdb: 3, overparametrization: False},
                                trainable: False},
                      enc_cfg: {name: tiny_enc,
                                trainable: False},
                      dec_cfg: {name: tiny_dec,
                                trainable: False}}}


# -------------------------------------------------
# Evaluation
# -------------------------------------------------
eval_cfg:
  metrics: ["psnr","ssim","lpips"]
  chop: {sf: 1, upscale: 1, chop_size_h: 256, chop_size_w: 256, chop_stride_h: 24, chop_stride_w: 43}
  # Used only by infer.py for qualitative PNG output
  in_folder:  /data/gjh8760/datasets/LOL-v1/eval15/low
  out_folder: ./runs/elir_llie_lolv1/predictions
