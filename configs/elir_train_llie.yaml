# ###########################################
# Setup Configuration
# ###########################################
env_cfg:
  run_name: elir_llie_lolv1
  project_name: fmir
  task: llie
  out_dir: ./runs
  seed: 2025


# -------------------------------------------------
# Dataset
# -------------------------------------------------
dataset_cfg:
  train_dataset: {name: LOLv1, path: /data/gjh8760/datasets/LOL-v1, split: our485, is_train: True, batch_size: 8, patch_size: 256, num_workers: 4}
  val_dataset:   {name: LOLv1, path: /data/gjh8760/datasets/LOL-v1, split: eval15, is_train: False, batch_size: 1, num_workers: 2}


# -------------------------------------------------
# Flow-Matching
# -------------------------------------------------
fm_cfg:
  method: l2_cfm_mse_loss
  k_steps: 5
  t_emb_dim: 160
  sigma_min: 0.00001
  sigma_s: 0.025
  dt: 0.05
  alpha: 0.001
  beta: 0.001


# -------------------------------------------------
# Model
# -------------------------------------------------
model_cfg:
  arch_cfg: {name: elir,
             params: { fm_cfg: {k_steps: 5, sigma_s: 0.025, latent_shape: [16,32,32], seed: 2025},
                      fmir_cfg: {name: lunet,
                                params: {ch_mult: [1,2,1,2], n_mid_blocks: 3, in_channels: 16, hid_channels: 128, out_channels: 16,
                                         t_emb_dim: 160, overparametrization: True},
                                trainable: True},
                      mmse_cfg: {name: rrdbnet,
                                params: {c_inout: 16, c_hid: 96, n_rrdb: 3, overparametrization: True},
                                trainable: True},
                      enc_cfg: {name: tiny_enc,
                                trainable: True},
                      dec_cfg: {name: tiny_dec,
                                trainable: False}}}

  teacher_cfg: {name: taesd,
                params: { },
                trainable: False}

# -------------------------------------------------
# Training
# -------------------------------------------------
train_cfg:
  epochs: 1000
  optimizer: !name:torch.optim.AdamW
  lr: 0.0002
  optimizer_params: {}
  ema_decay: 0.999
  max_steps: -1
  check_val_every_n_epoch: 20
  num_sanity_val_steps: 2
  save_images: True
  wandb: True


# -------------------------------------------------
# Evaluation
# -------------------------------------------------
eval_cfg:
  metrics: ["psnr","ssim","lpips"]
  chop: {sf: 1, upscale: 1, chop_size: 256, chop_stride: 224}
  log_images: True
  max_log_images: 15   # LOL-v1 eval15 has 15 images
