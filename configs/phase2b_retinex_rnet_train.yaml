# ###########################################
# Phase 2-B: Retinex (RetinexNet Decom-Net, pretrained & frozen) + LCFM
# Differs from Phase 2-A only in `decomposer_cfg`.
# ###########################################
env_cfg:
  run_name: phase2b_retinex_rnet
  project_name: fmir
  task: llie
  out_dir: ./runs
  seed: 2025


dataset_cfg:
  train_dataset: {name: LOLv1, path: /data/gjh8760/datasets/LOL-v1, split: our485, is_train: True, batch_size: 8, patch_size: 256, num_workers: 4}
  val_dataset:   {name: LOLv1, path: /data/gjh8760/datasets/LOL-v1, split: eval15, is_train: False, batch_size: 1, num_workers: 2}


fm_cfg:
  method: retinex_l2_cfm_loss
  lambda_I: 1.0
  lambda_R: 1.0
  fm_cfg_I:
    method: pixel_space_l2_cfm_loss
    k_steps: 2
    t_emb_dim: 160
    sigma_min: 0.00001
    sigma_s: 0.01
    dt: 0.1
    alpha: 0.001
  fm_cfg_R:
    method: l2_cfm_mse_loss
    k_steps: 5
    t_emb_dim: 160
    sigma_min: 0.00001
    sigma_s: 0.025
    dt: 0.05
    alpha: 0.001
    beta: 0.001


model_cfg:
  arch_cfg:
    name: elir_retinex
    params:
      decomposer_cfg:
        name: retinexnet_decomposer
        trainable: False
        params: {pretrained_path: third_party/retinexnet/decom_net.pth}

      R_fm_cfg: {k_steps: 5, sigma_s: 0.025, latent_shape: [16, 32, 32]}
      R_fmir_cfg:
        name: lunet
        trainable: True
        params: {ch_mult: [1, 2, 1, 2], n_mid_blocks: 3, in_channels: 16, hid_channels: 128,
                 out_channels: 16, t_emb_dim: 160, overparametrization: True}
      R_mmse_cfg:
        name: rrdbnet
        trainable: True
        params: {c_inout: 16, c_hid: 96, n_rrdb: 3, overparametrization: True}
      R_enc_cfg: {name: tiny_enc, trainable: True}
      R_dec_cfg: {name: tiny_dec, trainable: False}

      I_fm_cfg: {k_steps: 2, sigma_s: 0.01}
      I_fmir_cfg:
        name: lunet
        trainable: True
        params: {ch_mult: [1, 2, 1], n_mid_blocks: 2, in_channels: 1, hid_channels: 32,
                 out_channels: 1, t_emb_dim: 160, overparametrization: True}
      I_mmse_cfg:
        name: rrdbnet
        trainable: True
        params: {c_inout: 1, c_hid: 32, n_rrdb: 2, overparametrization: True}

  teacher_cfg: {name: taesd, params: {}, trainable: False}


train_cfg:
  epochs: 1000
  optimizer: !name:torch.optim.AdamW
  lr: 0.0002
  optimizer_params: {}
  ema_decay: 0.999
  max_steps: -1
  check_val_every_n_epoch: 20
  num_sanity_val_steps: 2
  save_images: True
  wandb: True


eval_cfg:
  metrics: ["psnr", "ssim", "lpips"]
  chop: {sf: 1, upscale: 1, chop_size: 256, chop_stride: 224}
  log_images: True
  max_log_images: 15
